name: 数字软盘生成器
options:
  bundleIdPrefix: com.digitalfloppy
  deploymentTarget:
    macOS: "12.0"
settings:
  base:
    SWIFT_VERSION: "5.7"
targets:
  数字软盘生成器:
    type: application
    platform: macOS
    sources:
      - path: 数字软盘生成器
    settings:
      base:
        INFOPLIST_FILE: 数字软盘生成器/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalfloppy.FloppyDiskGenerator
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "12.0"
