name: FloppyQR
options:
  bundleIdPrefix: com.digitalfloppy
  deploymentTarget:
    macOS: "12.0"
settings:
  base:
    SWIFT_VERSION: "5.7"
targets:
  FloppyQR:
    type: application
    platform: macOS
    sources:
      - path: FloppyQR
    settings:
      base:
        INFOPLIST_FILE: FloppyQR/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalfloppy.FloppyQR
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "12.0"
